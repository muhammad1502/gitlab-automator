<!DOCTYPE html>
<html>
<head>
  <title>Triage Settings</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; width: 420px; background: #f9f9fb; color: #333; }
    h3 { margin-top: 0; color: #1068bf; border-bottom: 2px solid #e1e1e1; padding-bottom: 10px; }
    .action-item { background: white; margin-bottom: 15px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
    .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    input, textarea { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .label-input { flex: 2; font-weight: 600; }
    .key-input { width: 50px; text-align: center; background: #fff8e1; border: 1px solid #ffe082; font-weight: bold; color: #795548; }
    textarea { width: 95%; height: 70px; resize: vertical; font-family: monospace; background: #fafafa; }
    button { cursor: pointer; border-radius: 4px; border: none; padding: 8px 12px; font-weight: 500; transition: opacity 0.2s; }
    button:hover { opacity: 0.8; }
    #add { background: #1068bf; color: white; width: 100%; margin-top: 5px; }
    #save { background: #2e7d32; color: white; width: 100%; margin-top: 20px; font-size: 14px; font-weight: bold; }
    .delete-btn { background: #f44336; color: white; padding: 5px 10px; }
    .hint { font-size: 11px; color: #666; margin-bottom: 15px; }
  </style>
</head>
<body>
  <h3>Triage Hotkeys</h3>
  <p class="hint">Trigger your actions using <b>Alt + Shift + [Key]</b></p>
  <div id="actions-list"></div>
  <button id="add">➕ Add New Action</button>
  <button id="save">💾 Save All Settings</button>
  <script src="options.js"></script>
</body>
</html>
